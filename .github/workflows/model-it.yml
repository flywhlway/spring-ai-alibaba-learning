# Optional 模型 IT — 仅 workflow_dispatch；无 Key 时跳过且不失败（D-03）
# 禁止 job-level if: secrets.*（RESEARCH Pitfall 1）
name: Model IT (optional)

on:
  workflow_dispatch:
  workflow_call:

jobs:
  check-dashscope-secret:
    name: Check AI_DASHSCOPE_API_KEY
    runs-on: ubuntu-latest
    outputs:
      defined: ${{ steps.c.outputs.defined }}
    steps:
      - id: c
        name: Detect DashScope secret
        run: |
          if [ -n "${{ secrets.AI_DASHSCOPE_API_KEY }}" ]; then
            echo "defined=true" >> "$GITHUB_OUTPUT"
          else
            echo "defined=false" >> "$GITHUB_OUTPUT"
          fi

  model-it:
    name: Model integration tests
    needs: check-dashscope-secret
    if: needs.check-dashscope-secret.outputs.defined == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: |
            pom.xml
            common/pom.xml
            starter/pom.xml
            projects/*/pom.xml
      - name: Install common + starter
        run: mvn -B -pl common,starter -am clean install
      - name: Run smart-cs-platform tests with DashScope
        env:
          AI_DASHSCOPE_API_KEY: ${{ secrets.AI_DASHSCOPE_API_KEY }}
        # 永不 echo 密钥；仅经 env 注入
        run: mvn -B -f projects/smart-cs-platform/pom.xml test
