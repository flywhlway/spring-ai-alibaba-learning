server:
  port: 18005

spring:
  application:
    name: retry-demo
  ai:
    # 跨厂商通用重试前缀（教程 §4.8），勿写成 spring.ai.dashscope.retry
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 1000ms
        multiplier: 2
        max-interval: 10000ms
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7

logging:
  level:
    com.flywhl.saa.retry: INFO
    org.springframework.retry: DEBUG
