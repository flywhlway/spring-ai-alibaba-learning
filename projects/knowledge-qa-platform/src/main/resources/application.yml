# =====================================================================
# 项目一 · AI 企业知识库问答平台（knowledge-qa-platform，端口 19100）
#
# 中间件依赖（统一由 docker/docker-compose.yml + 本项目 override 提供）：
#   docker compose -f docker/docker-compose.yml \
#                  -f projects/knowledge-qa-platform/docker-compose.override.yml \
#                  --profile core --profile vector --profile cloud --profile kqa up -d
#
# 密钥一律环境变量注入（scripts/setup-env.sh），严禁硬编码。
# =====================================================================
server:
  port: 19100

spring:
  application:
    name: knowledge-qa-platform

  # ----------------- 业务库：PostgreSQL（schema 由 db/schema.sql 管理，JPA 只校验不建表） -----------------
  datasource:
    url: jdbc:postgresql://localhost:5432/kqa_platform
    username: saa
    password: saa123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      pool-name: kqa-hikari
  jpa:
    hibernate:
      ddl-auto: none        # DDL 唯一真源 = db/schema.sql，禁止 Hibernate 自动建表
    open-in-view: false
    properties:
      hibernate:
        default_schema: public

  # ----------------- Redis：会话记忆 + 热点答案缓存 -----------------
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3s

  # ----------------- AI：多模型（DashScope 主 / DeepSeek 备）+ Milvus + Nacos Prompt -----------------
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3    # 1024 维，与下方 Milvus embedding-dimension 对齐
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
    vectorstore:
      milvus:
        client:
          host: localhost
          port: 19530
        database-name: default
        collection-name: kqa_knowledge
        embedding-dimension: 1024
        index-type: IVF_FLAT
        metric-type: COSINE
        initialize-schema: true
    # Nacos Prompt 模板热更新（Data ID: spring.ai.alibaba.configurable.prompt）
    nacos:
      prompt:
        template:
          enabled: true

  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      username: nacos
      password: nacos

  servlet:
    multipart:
      max-file-size: 50MB        # 知识文档上传上限
      max-request-size: 60MB

# ----------------- 统一 AI Starter（审计 Advisor / 模型路由降级 / 成本采集） -----------------
saa:
  learning:
    primary-model: dashScopeChatModel
    fallback-model: deepSeekChatModel
    audit-enabled: true
    cost-tracking:
      enabled: true
      price-per-1k-input-tokens: 0.0008
      price-per-1k-output-tokens: 0.002

# ----------------- 项目自有配置（config/ 下 @ConfigurationProperties 绑定） -----------------
kqa:
  minio:
    endpoint: http://localhost:9000
    access-key: ${MINIO_ACCESS_KEY:minioadmin}      # 本机开发默认值，生产必须显式注入
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: kqa-documents
  rag:
    top-k: 5                     # 检索召回条数
    similarity-threshold: 0.35   # 低于该分值的召回被丢弃
    chunk-size: 512              # TokenTextSplitter 单块 token 数
    chunk-overlap: 64
    citation-enabled: true       # 答案附引用溯源
  memory:
    max-messages: 20             # 单会话保留的最近消息数（Redis）
    ttl: 7d                      # 会话过期时间
  security:
    jwt:
      issuer: knowledge-qa-platform
      access-token-ttl: 2h

# ----------------- API 文档（统一 /doc.html，见架构文档 §5.2） -----------------
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
knife4j:
  enable: true
  setting:
    language: zh_cn

# ----------------- 可观测：Prometheus 指标 + 健康检查 -----------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.flywhl.saa: INFO
    org.springframework.ai: INFO
    com.alibaba.cloud.ai: INFO
