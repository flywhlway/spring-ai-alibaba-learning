# 冒烟测试 Profile：H2 内存库 + 关闭 Nacos Prompt，外部中间件由 @MockBean 替代
spring:
  main:
    lazy-initialization: true
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:scs_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  data:
    redis:
      host: localhost
      port: 16379
  elasticsearch:
    uris: http://localhost:19200
  ai:
    dashscope:
      api-key: test-dummy-key
    deepseek:
      api-key: test-dummy-key
    nacos:
      prompt:
        template:
          enabled: false
    vectorstore:
      milvus:
        client:
          host: localhost
          port: 19530
        initialize-schema: false
      elasticsearch:
        initialize-schema: false
      redis:
        initialize-schema: false

scs:
  security:
    jwt:
      secret: "dev-only-scs-jwt-secret-key-32bytes!!"
  cache:
    redis-uri: redis://localhost:16380
